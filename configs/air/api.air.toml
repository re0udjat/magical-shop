root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "tmp/api -limiter-enabled=false -cors-trusted-origins='http://localhost:9000 http://localhost:9001'"
  full_bin = "./tmp/api -limiter-enabled=false -cors-trusted-origins='http://localhost:9000 http://localhost:9001'"
  include_ext = ["go", "tpl", "tmpl", "html", "toml"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  stop_on_error = true
  delay = 1000
  log_color = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true